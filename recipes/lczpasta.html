    <h1>Low-Carb Zucchini Pasta</h1>

    <h2>Serves 4</h2>
    <h2>Ingredients</h2>
        <ul>
            <li>4 zucchini, peeled</li>
            <li>2 tablespoons olive oil</li>
            <li>½ cup water</li>
            <li>salt and ground black pepper to taste</li>
        </ul>   
    <h1>Directions</h1>

        <h2>Step 1</h2>
            <p>Use a vegetable peeler to cut long, wide strips down one side of one zucchini until you reach the seeds. Turn zucchini and repeat on three remaining sides. Repeat with remaining zucchini. Discard zucchini cores.</p>
        <h2>Step 2</h2>
            <p>Stack zucchini strips on top of each other, then cut thin strips lengthwise along the stack; strips will resemble spaghetti noodles.</p>
        <h2>Step 3</h2>
            <p>Heat olive oil in a large skillet over medium heat. Add zucchini and water; cook and stir until zucchini is tender but still crisp, about 5 minutes. Season with salt and pepper.</p>
